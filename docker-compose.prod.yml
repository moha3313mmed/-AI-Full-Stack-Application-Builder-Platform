version: "3.9"

services:
  postgres:
    extends:
      file: docker-compose.yml
      service: postgres
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: always

  redis:
    extends:
      file: docker-compose.yml
      service: redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    restart: always

  minio:
    extends:
      file: docker-compose.yml
      service: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    restart: always

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: builder-web
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      API_URL: http://api:4000
    depends_on:
      api:
        condition: service_healthy
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: builder-api
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://builder:${POSTGRES_PASSWORD}@postgres:5432/builder_platform?schema=public
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

volumes:
  postgres-data:
  redis-data:
  minio-data:
